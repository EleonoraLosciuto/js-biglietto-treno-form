<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS_DOM_2</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./main.js"></script>
</head>
<body>
    <main class="container">
        <h1>Calcola il prezzo del tuo biglietto</h1>
        <form id="ticket">
            <label for="kmNum">Inserisci il numero di Km da percorrere</label>
            <input type="number" id="kmNum"> <br>

            <label for="birthDate">Inserisci il tuo anno di nascita</label>
            <input type="number" name="birthDate" id="birthDate"> <br>

            
            <button type="submit">Calcola Prezzo</button>
        </form>

        <div class="card">
            <h3>I tuoi dati</h3>
            <ul>
                <li>Km da percorrere: <span id="kmInput"></span></li>
                <li>Anni: <span id="ageUser"></span> </li>
                <li>Prezzo finale: <span id="finalPrice"></span> </li>
            </ul>
        </div>
    </main>
</body>
</html>
